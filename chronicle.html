<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crownfall — The Great Chronicle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09070b;--gold:#c8a84b;--gold2:#e8c870;--dim:#6a5535;--text:#b8a070;--border:rgba(180,140,60,0.13)}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'IM Fell English',Georgia,serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(180,140,60,.1)}

/* ── HEADER ── */
.chronicle-header{text-align:center;padding:56px 20px 36px;border-bottom:1px solid var(--border);background:radial-gradient(ellipse at 50% 30%,rgba(60,35,6,.5) 0%,transparent 55%)}
.ch-orn{font-size:14px;color:rgba(140,105,40,.3);letter-spacing:.4em;margin-bottom:18px}
.ch-title{font-family:'Cinzel',serif;font-size:38px;color:var(--gold);letter-spacing:.18em;margin-bottom:6px;text-shadow:0 0 50px rgba(180,110,20,.25)}
.ch-sub{font-size:13px;font-style:italic;color:rgba(100,78,35,.55);line-height:1.65;max-width:460px;margin:0 auto 20px}
.ch-count{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:rgba(100,78,35,.4);text-transform:uppercase}
.play-link{display:inline-block;margin-top:18px;padding:10px 28px;background:transparent;border:1px solid rgba(180,140,60,.28);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.22em;text-decoration:none;text-transform:uppercase;transition:all .22s}
.play-link:hover{background:rgba(180,140,60,.07);border-color:var(--gold)}

/* ── FILTERS ── */
.filters{max-width:860px;margin:28px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.22em;color:rgba(100,78,35,.45);text-transform:uppercase;margin-right:4px}
.filter-select{background:rgba(0,0,0,.3);border:1px solid rgba(100,78,35,.2);color:var(--text);font-family:'IM Fell English',serif;font-size:13px;padding:6px 10px;outline:none;cursor:pointer}
.filter-select option{background:#120d06}

/* ── ENTRIES ── */
.entries{max-width:860px;margin:0 auto;padding:32px 20px 80px}
.entry{border:1px solid rgba(100,78,35,.15);background:rgba(0,0,0,.18);margin-bottom:18px;transition:border-color .18s}
.entry:hover{border-color:rgba(180,140,60,.25)}
.entry-header{display:flex;align-items:center;gap:14px;padding:14px 18px 12px;border-bottom:1px solid rgba(100,78,35,.08)}
.entry-sigil{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.entry-sigil img{width:30px;height:30px;object-fit:contain;opacity:.75}
.entry-char{flex:1}
.entry-name{font-family:'Cinzel',serif;font-size:16px;color:var(--gold)}
.entry-house{font-size:11px;font-style:italic;color:var(--dim);margin-top:2px}
.entry-meta{text-align:right;font-size:10px;font-style:italic;color:rgba(80,62,28,.5);line-height:1.6}
.entry-body{padding:16px 18px}
.entry-text{font-size:14px;line-height:1.88;color:var(--text)}
.entry-text::first-letter{font-family:'Cinzel',serif;font-size:42px;float:left;line-height:.82;margin:5px 7px -3px 0;color:var(--gold)}
.entry-footer{padding:0 18px 12px;display:flex;align-items:center;gap:8px}
.entry-location-tag{font-size:9px;font-style:italic;color:rgba(100,78,35,.45);padding:2px 8px;border:1px solid rgba(100,78,35,.12)}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:80px 20px;font-size:14px;font-style:italic;color:rgba(80,62,28,.4);line-height:1.8}
.loading-dots{display:flex;justify-content:center;gap:5px;padding:60px 0}
.ld{width:7px;height:7px;border-radius:50%;background:rgba(180,140,60,.3);animation:dp 1.4s ease infinite;opacity:0}
.ld:nth-child(2){animation-delay:.22s}
.ld:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,80%,100%{opacity:0}40%{opacity:.8}}

/* ── PAGINATION ── */
.pagination{display:flex;gap:8px;justify-content:center;margin-top:24px}
.page-btn{background:transparent;border:1px solid rgba(100,78,35,.2);color:var(--dim);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;padding:7px 14px;cursor:pointer;transition:all .18s;text-transform:uppercase}
.page-btn:hover:not(:disabled){border-color:rgba(180,140,60,.3);color:var(--text)}
.page-btn.on{border-color:rgba(180,140,60,.4);color:var(--gold)}
.page-btn:disabled{opacity:.2;cursor:not-allowed}
</style>
</head>
<body>

<div class="chronicle-header">
  <div class="ch-orn">— ✦ —</div>
  <div class="ch-title">THE GREAT CHRONICLE</div>
  <div class="ch-sub">A record of deeds, great and terrible, committed across the realm in the reign of Jaehaerys I Targaryen. Written by those who lived them.</div>
  <div class="ch-count" id="total-count">Consulting the maesters...</div>
  <a href="/" class="play-link">Enter the Realm</a>
</div>

<div class="filters" id="filters-row" style="display:none">
  <span class="filter-lbl">Filter by</span>
  <select class="filter-select" id="filter-house" onchange="applyFilter()">
    <option value="">All Houses</option>
  </select>
  <select class="filter-select" id="filter-location" onchange="applyFilter()">
    <option value="">All Locations</option>
  </select>
  <select class="filter-select" id="filter-sort" onchange="applyFilter()">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
  </select>
</div>

<div class="entries" id="entries-wrap">
  <div class="loading-dots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
</div>

<div class="pagination" id="pagination"></div>

<script>
// ════════════════════════════════
// CONFIG — same as crownfall.html
// ════════════════════════════════
const SUPABASE_URL = 'https://lvyudhjhbyhxerwuglsf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2eXVkaGpoYnloeGVyd3VnbHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODA2MDUsImV4cCI6MjA4ODc1NjYwNX0.9u5R9NkGyLq4ht5_eTCNXl3kpwpFY_fGp9-i4vTmDSI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// House icon mapping (sigils are served from Supabase or we use colored dots)
// We don't have the base64 icons here - use colored house dots instead
const HOUSE_COLORS = {
  targaryen:'#c0392b',stark:'#7f8c8d',lannister:'#c8960c',baratheon:'#8e44ad',
  tully:'#1a6891',tyrell:'#27ae60',martell:'#e67e22',arryn:'#2980b9',
  greyjoy:'#2c3e50',bolton:'#c0392b',blackwood:'#1a3a1a',bracken:'#7d3c01',
  none:'#5d4037',
};

// ════════════════════════════════
// STATE
// ════════════════════════════════
let allEntries = [];
let filtered = [];
let page = 0;
const PER_PAGE = 12;

// ════════════════════════════════
// LOAD
// ════════════════════════════════
window.addEventListener('load', async () => {
  const { data, error } = await sb
    .from('chronicles')
    .select('*')
    .order('created_at', { ascending: false });

  if (error || !data) {
    document.getElementById('entries-wrap').innerHTML =
      '<div class="empty-state">The chronicle could not be read. The ravens may be delayed.</div>';
    return;
  }

  allEntries = data;
  document.getElementById('total-count').textContent =
    allEntries.length
      ? allEntries.length + ' deed' + (allEntries.length !== 1 ? 's' : '') + ' inscribed'
      : 'No deeds inscribed yet';

  if (allEntries.length) {
    buildFilters();
    document.getElementById('filters-row').style.display = 'flex';
  }

  applyFilter();
});

// ════════════════════════════════
// FILTERS
// ════════════════════════════════
function buildFilters() {
  const houses = [...new Set(allEntries.map(e => e.house_full).filter(Boolean))].sort();
  const locs   = [...new Set(allEntries.map(e => e.location).filter(Boolean))].sort();

  const hSel = document.getElementById('filter-house');
  houses.forEach(h => { const o=document.createElement('option'); o.value=o.textContent=h; hSel.appendChild(o); });

  const lSel = document.getElementById('filter-location');
  locs.forEach(l => { const o=document.createElement('option'); o.value=o.textContent=l; lSel.appendChild(o); });
}

function applyFilter() {
  const house = document.getElementById('filter-house').value;
  const loc   = document.getElementById('filter-location').value;
  const sort  = document.getElementById('filter-sort').value;

  filtered = allEntries
    .filter(e => (!house || e.house_full === house) && (!loc || e.location === loc));

  if (sort === 'oldest') filtered = [...filtered].reverse();

  page = 0;
  render();
}

// ════════════════════════════════
// RENDER
// ════════════════════════════════
function render() {
  const wrap = document.getElementById('entries-wrap');
  const slice = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state">No deeds match your search.<br>The realm has been quiet — or the maesters are behind.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  wrap.innerHTML = slice.map(e => entryHTML(e)).join('');
  renderPagination();
}

function entryHTML(e) {
  const color = HOUSE_COLORS[e.house_key] || '#5d4037';
  const date  = new Date(e.created_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});

  return `<div class="entry">
    <div class="entry-header">
      <div class="entry-sigil">
        <div style="width:30px;height:30px;border-radius:50%;background:${color};opacity:.6;border:1px solid rgba(255,255,255,.1)"></div>
      </div>
      <div class="entry-char">
        <div class="entry-name">${esc(e.char_name||'Unknown')}</div>
        <div class="entry-house">${esc(e.house_full||'No House')}</div>
      </div>
      <div class="entry-meta">
        ${esc(e.season||'Unknown season')}<br>${date}
      </div>
    </div>
    <div class="entry-body">
      <div class="entry-text">${esc(e.deed_text||'')}</div>
    </div>
    <div class="entry-footer">
      ${e.location ? `<span class="entry-location-tag">📍 ${esc(e.location)}</span>` : ''}
    </div>
  </div>`;
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" ${page===0?'disabled':''} onclick="goPage(${page-1})">← Prior</button>`;
  for (let i = 0; i < total; i++) {
    if (total <= 7 || Math.abs(i - page) <= 1 || i === 0 || i === total-1) {
      html += `<button class="page-btn ${i===page?'on':''}" onclick="goPage(${i})">${i+1}</button>`;
    } else if (Math.abs(i - page) === 2) {
      html += `<span style="color:rgba(100,78,35,.3);align-self:center">…</span>`;
    }
  }
  html += `<button class="page-btn" ${page===total-1?'disabled':''} onclick="goPage(${page+1})">Next →</button>`;
  el.innerHTML = html;
}

function goPage(n) {
  page = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════
// UTILS
// ════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
